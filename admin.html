
}
</script>
<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<link rel='stylesheet' href='style.css'><title>Admin</title></head><body>
<div class='detail'><h1>Admin Panel</h1><a href='index.html'>⬅ Back Site</a>
<p>Manage menu items locally.</p>
<input id='n' placeholder='Food Name'><input id='p' placeholder='Price'><input id='c' placeholder='Category'><input id='i' placeholder='Image URL'>
<button onclick='addFood()'>Add Food</button><div id='rows'></div></div>
<script src='foods.js'></script>
<script>
function save(){localStorage.foods=JSON.stringify(foods)}
function draw(){rows.innerHTML=foods.map((f,x)=>`<div class=row><div>${f.name} - $${f.price}</div><button onclick="delFood(${x})">Delete</button></div>`).join('')}
function addFood(){foods.push({id:Date.now(),name:n.value,cat:c.value||'New',price:+p.value||10,img:i.value||foods[0].img,desc:'New item'});save();draw()}
function delFood(x){foods.splice(x,1);save();draw()}
draw()
</script></body></html>
